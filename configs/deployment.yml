apiVersion: apps/v1
kind: Deployment

metadata:
  name: enterprise-app
  labels:
    app: enterprise

spec:
  replicas: 2

  selector:
    matchLabels:
      app: enterprise

  template:
    metadata:
      labels:
        app: enterprise

    spec:
      containers:
      - name: enterprise-container
        image: nginx:1.25
        ports:
        - containerPort: 80